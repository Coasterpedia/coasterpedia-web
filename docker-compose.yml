services:
  mariadb:
    image: mariadb:11.8
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      CARGO_MYSQL_PASSWORD: ${CARGO_MYSQL_PASSWORD}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DATABASE_PASSWORD}
      COASTERPEDIA_TOOLS_MYSQL_PASSWORD: ${COASTERPEDIA_TOOLS_MYSQL_PASSWORD}
      BACKUP_MYSQL_PASSWORD: ${BACKUP_MYSQL_PASSWORD}
    networks:
      - web
    ports:
      - "100.126.37.32:3306:3306"
    volumes:
    - mariadb:/var/lib/mysql
    - ./config/mariadb/mariadb.cnf:/etc/mysql/conf.d/mariadb.cnf:ro
    - ./config/mariadb/01-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
  mediawiki:
    image: ghcr.io/coasterpedia/coasterpedia-web/mediawiki@${MEDIAWIKI_IMAGE}
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    depends_on:
      - mariadb
      - redis
    volumes:
      - ./config/mediawiki/LocalSettings.php:/var/www/html/w/LocalSettings.php
      - ./config/nginx/coasterpedia.conf:/etc/nginx/http.d/default.conf
    ports:
      -  127.0.0.1:9001:80
    environment:
      MYSQL_DATABASE: coasterpedia
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_SERVER: mariadb
      MYSQL_USER: coasterpedia
      CARGO_MYSQL_DATABASE: cargo_db
      CARGO_MYSQL_PASSWORD: ${CARGO_MYSQL_PASSWORD}
      CARGO_MYSQL_SERVER: mariadb
      CARGO_MYSQL_USER: cargo_user
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_ACCESS_SECRET: ${R2_ACCESS_SECRET}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      SECRET_KEY: ${SECRET_KEY}
      ES_IP: host.docker.internal
      OAUTH_PUBLIC: ${OAUTH_PUBLIC}
      OAUTH_PRIVATE: ${OAUTH_PRIVATE}
      CLOUDFLARE_ZONEID: ${CLOUDFLARE_ZONEID}
      CLOUDFLARE_APITOKEN: ${CLOUDFLARE_APITOKEN}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET}
      MATOMO_API_KEY: ${MATOMO_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
  redis:
    image: redis:alpine
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - redis:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
  opensearch:
    image: opensearchproject/opensearch:1.3
    environment:
      - discovery.seed_hosts=single-node
      - bootstrap.memory_lock=true # Disable JVM heap memory swapping
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m" # Set min and max JVM heap sizes to at least 50% of system RAM
    ulimits:
      memlock:
        soft: -1 # Set memlock to unlimited (no soft or hard limit)
        hard: -1
      nofile:
        soft: 65536 # Maximum number of open files for the opensearch user - set to at least 65536
        hard: 65536
    volumes:
      - opensearch:/usr/share/opensearch/data # Creates volume called opensearch-data1 and mounts it to the container
    networks:
      - web
  jobrunner-chron:
    image: ghcr.io/coasterpedia/coasterpedia-web/jobrunner@${JOBRUNNER_IMAGE}
    restart: unless-stopped
    init: true
    user: "www-data:www-data"
    security_opt:
      - no-new-privileges:true
    depends_on:
      - mediawiki
      - redis
      - mariadb
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/mediawiki/LocalSettings.php:/var/www/html/w/LocalSettings.php
    networks:
      - web
    environment:
      RUNNER_TYPE: Chron
      MYSQL_DATABASE: coasterpedia
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_SERVER: mariadb
      MYSQL_USER: coasterpedia
      CARGO_MYSQL_DATABASE: cargo_db
      CARGO_MYSQL_PASSWORD: ${CARGO_MYSQL_PASSWORD}
      CARGO_MYSQL_SERVER: mariadb
      CARGO_MYSQL_USER: cargo_user
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_ACCESS_SECRET: ${R2_ACCESS_SECRET}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      SECRET_KEY: ${SECRET_KEY}
      ES_IP: ${ES_IP}
      OAUTH_PUBLIC: ${OAUTH_PUBLIC}
      OAUTH_PRIVATE: ${OAUTH_PRIVATE}
      CLOUDFLARE_ZONEID: ${CLOUDFLARE_ZONEID}
      CLOUDFLARE_APITOKEN: ${CLOUDFLARE_APITOKEN}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET}
      MATOMO_API_KEY: ${MATOMO_API_KEY}
  jobrunner:
    image: ghcr.io/coasterpedia/coasterpedia-web/jobrunner@${JOBRUNNER_IMAGE}
    restart: unless-stopped
    init: true
    user: "www-data:www-data"
    cpu_shares: 256
    security_opt:
      - no-new-privileges:true
    depends_on:
      - mediawiki
      - redis
      - mariadb
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/mediawiki/LocalSettings.php:/var/www/html/w/LocalSettings.php
    networks:
      - web
    environment:
      MYSQL_DATABASE: coasterpedia
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_SERVER: mariadb
      MYSQL_USER: coasterpedia
      CARGO_MYSQL_DATABASE: cargo_db
      CARGO_MYSQL_PASSWORD: ${CARGO_MYSQL_PASSWORD}
      CARGO_MYSQL_SERVER: mariadb
      CARGO_MYSQL_USER: cargo_user
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_ACCESS_SECRET: ${R2_ACCESS_SECRET}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      SECRET_KEY: ${SECRET_KEY}
      ES_IP: ${ES_IP}
      OAUTH_PUBLIC: ${OAUTH_PUBLIC}
      OAUTH_PRIVATE: ${OAUTH_PRIVATE}
      CLOUDFLARE_ZONEID: ${CLOUDFLARE_ZONEID}
      CLOUDFLARE_APITOKEN: ${CLOUDFLARE_APITOKEN}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET}
      MATOMO_API_KEY: ${MATOMO_API_KEY}
  matomo:
    image: ghcr.io/coasterpedia/coasterpedia-web/matomo@${MATOMO_IMAGE}
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    depends_on:
      - mariadb
    volumes:
      - ./config/nginx/matomo.conf:/etc/nginx/http.d/matomo.conf
    ports:
      - 127.0.0.1:9002:80
    environment:
      MATOMO_DATABASE_DBNAME: coasterpedia_analytics
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DATABASE_PASSWORD}
      MATOMO_DATABASE_HOST: mariadb
      MATOMO_DATABASE_USERNAME: coasterpedia_analytics
      MATOMO_EMAIL_HOST: ${SMTP_HOST}
      MATOMO_EMAIL_USERNAME: ${SMTP_USER}
      MATOMO_EMAIL_PASSWORD: ${SMTP_PASSWORD}
  ofelia:
    image: mcuadros/ofelia:0.3
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    depends_on:
      - mediawiki
      - matomo
      - dr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/ofelia/ofelia.ini:/etc/ofelia/config.ini:ro
  dr:
    image: ghcr.io/coasterpedia/coasterpedia-web/dr@${DR_IMAGE}
    restart: unless-stopped
    init: true
    user: "dr:dr"
    security_opt:
      - no-new-privileges:true
    environment:
      DB_HOST: mariadb
      DB_NAME: coasterpedia coasterpedia_analytics cargo_db coasterpedia_tools
      AGE_RECIPIENT: ${AGE_RECIPIENT}
      R2_REMOTE: ${R2_REMOTE}
      HC_URL: ${HC_BASE_BACKUP_URL}
      RCLONE_CONFIG: /secrets/rclone.conf
      DEFAULTS_FILE: /secrets/backup.cnf
      WORKDIR: /work
    depends_on:
      - mariadb
    volumes:
      - ../coasterpedia-secrets:/secrets:ro      # backup.cnf + rclone.conf (git-ignored)
      - dr-work:/work
    networks:
      - web
networks:
  web:
volumes:
  redis:
  dr-work:
  mariadb:
  opensearch: