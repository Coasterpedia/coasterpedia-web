log_format detailed '$http_x_forwarded_for - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

server {
    server_name _;
    listen 80 default_server;
    root /var/www/html;
    index index.php;
    port_in_redirect off;

    client_max_body_size 32m;
    client_body_timeout 60;

    access_log /dev/stdout detailed;
    error_log /dev/stdout;

    # FastCGI defaults applied to all FastCGI locations
    fastcgi_keep_conn on;
    fastcgi_read_timeout 30s;
    fastcgi_send_timeout 30s;
    fastcgi_connect_timeout 10s;

    # Allow robots.txt in case you have one
    location = /robots.txt {
    }

    location ~ ^/w/(index|load|api|thumb|opensearch_desc|img_auth)\.php$ {
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/var/run/php-fpm.sock;
    }

    location ~ ^/w/rest\.php(/|$) {
        include /etc/nginx/fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass unix:/var/run/php-fpm.sock;
    }

    # Images
    location /w/images {
        # Separate location for images/ so .php execution won't apply
    }
    location /w/images/deleted {
        deny all;
    }
    location = /w/LocalSettings.php {
        deny all;
    }
    # MediaWiki assets (usually images)
    location ~ ^/w/resources/(assets|lib|src) {
        try_files $uri 404;
        add_header Cache-Control "public";
        expires 7d;
    }
    # Assets, scripts and styles from skins and extensions
    location ~ ^/w/(skins|extensions)/.+\.(css|js|gif|jpg|jpeg|png|svg|wasm|ttf|woff|woff2)$ {
        try_files $uri 404;
        add_header Cache-Control "public";
        expires 7d;
    }
    # Favicon
    location = /favicon.ico {
    }

    # License and credits files
    location ~ ^/w/(COPYING|CREDITS)$ {
        default_type text/plain;
    }

    location ~ /\.(svn|git)(/|$) { deny all; }
    location ~ /\.ht { deny all; }
    location /w/mw-config { deny all; }

    # Main wiki entry point
    location /wiki/ {
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/w/index.php;
        fastcgi_pass unix:/var/run/php-fpm.sock;
    }

    location = / {
        return 301 /wiki/Main_Page;
    }

    # ImageFetch service (CoasterpediaServices/InternalApi container)
    location = /imagefetch {
        proxy_pass http://coasterpedia-services:8080/imagefetch;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location / {
        return 404;
    }
}
