[global]
# "Job failed" alerting. The healthchecks.io pings inside each script cover the
# other failure mode: "job never ran at all".
save-folder = /tmp/ofelia-reports
save-only-on-error = true

# Ordering:
#   03:00  VM takes the base dump           (VM's own ofelia.ini)
#   03:30  DR host mirrors it down
#   04:00  DR host drills against it
#   04:23  GitHub Actions rebuilds + redeploys production
# so the drill always exercises the image currently in production, never one
# built minutes earlier.

[job-exec "mirror-dumps"]
schedule = 0 30 3,7,11,15,19,23 * * *
container = coasterpedia-dr-dr-1
command = /bin/bash -c 'HC_URL="$HC_MIRROR_URL" /opt/dr/mirror-dumps.sh'
no-overlap = true

[job-exec "drill"]
schedule = 0 0 4 * * *
container = coasterpedia-dr-dr-1
command = /bin/bash -c 'HC_URL="$HC_DRILL_URL" /opt/dr/drill.sh'
no-overlap = true

[job-exec "mirror-images"]
schedule = 0 0 5 * * *
container = coasterpedia-dr-dr-1
command = /bin/bash -c 'HC_URL="$HC_IMAGES_URL" /opt/dr/mirror-images.sh'
no-overlap = true

# The load-bearing RPO alarm. With no R2 binlog backstop, this is the ONLY
# thing that tells you the stream died and your RPO has silently degraded to
# "last night's dump". Ten minutes, well inside the 15-minute target.
[job-exec "binlog-staleness"]
schedule = 0 */10 * * * *
container = coasterpedia-dr-dr-1
command = /bin/bash -c 'HC_URL="$HC_STALENESS_URL" /opt/dr/binlog-staleness.sh'
no-overlap = true

[job-local "self-update"]
schedule = 0 0 6 * * *
command = /bin/sh -c "cd /pi && git pull && docker compose --env-file .env --env-file versions.env -f docker-compose.pi.yml pull && docker compose --env-file .env --env-file versions.env -f docker-compose.pi.yml up -d"