name: Docker
on:
  schedule:
    - cron: '23 4 * * *'
  push:
    branches: [ "main", "develop" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  mediawiki_build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: coasterpedia/coasterpedia-web/mediawiki

    outputs:
      digest: ${{steps.build-and-push.outputs.digest}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Mediawiki
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile-mediawiki
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}-mediawiki-v2
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-mediawiki-v2
          platforms: linux/arm64
          target: mediawiki

  matomo_build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: coasterpedia/coasterpedia-web/matomo

    outputs:
      digest: ${{steps.build-and-push.outputs.digest}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile-matomo
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}-matomo
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-matomo
          platforms: linux/arm64

  jobrunner_build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: coasterpedia/coasterpedia-web/jobrunner

    outputs:
      digest: ${{steps.build-and-push.outputs.digest}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile-mediawiki
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}-mediawiki-v2
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-mediawiki-v2
          platforms: linux/arm64
          target: jobrunner
  
  dr_build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: coasterpedia/coasterpedia-web/dr

    outputs:
      digest: ${{steps.build-and-push.outputs.digest}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile-dr
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}-dr
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-dr
          platforms: linux/arm64

  opensearch_build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: coasterpedia/coasterpedia-web/opensearch
      TAG: v1.3.20-12

    outputs:
      digest: ${{steps.build-and-push.outputs.digest}}

    steps:
      - name: Checkout repository
        run: git clone https://gitlab.wikimedia.org/repos/search-platform/cirrussearch-opensearch-image.git -b ${{ env.TAG }}

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        run: cd cirrussearch-opensearch-image && DOCKER_BUILDKIT=1 docker build --target production --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} -f .pipeline/blubber.yaml . && docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: [mediawiki_build, matomo_build, jobrunner_build, dr_build, opensearch_build]
    permissions:
      contents: write
    concurrency:
      group: deploy
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: develop

      - name: Record deployed digests
        run: |
          cat > versions.env <<EOF
          MEDIAWIKI_IMAGE=${{needs.mediawiki_build.outputs.digest}}
          JOBRUNNER_IMAGE=${{needs.jobrunner_build.outputs.digest}}
          MATOMO_IMAGE=${{needs.matomo_build.outputs.digest}}
          DR_IMAGE=${{needs.dr_build.outputs.digest}}
          OPENSEARCH_IMAGE=v1.3.20-12
          EOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.env
          if ! git diff --staged --quiet; then
            git commit -m "chore: record deployed digests [skip ci]"
            git pull --rebase origin develop
            git push origin HEAD:develop
          fi
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DOCKER_SSH_2_PRIVATE_KEY }}
          known_hosts: ${{ secrets.DOCKER_SSH_2_KNOWN_HOSTS }}
      - name: Write secret files
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          BACKUP_CNF: ${{ secrets.BACKUP_CNF }}
        run: |
          mkdir -p secret_files
          printf '%s' "$RCLONE_CONF" > secret_files/rclone.conf
          printf '%s' "$BACKUP_CNF" > secret_files/backup.cnf
          chmod 600 secret_files/*

      - name: Ensure remote secrets dir exists
        run: ssh ${{ secrets.DOCKER_HOST_2 }} 'mkdir -p coasterpedia-secrets'

      - name: Copy secret files to server
        run: |
          scp -p secret_files/rclone.conf ${{ secrets.DOCKER_HOST_2 }}:coasterpedia-secrets/rclone.conf
          scp -p secret_files/backup.cnf ${{ secrets.DOCKER_HOST_2 }}:coasterpedia-secrets/backup.cnf
          ssh ${{ secrets.DOCKER_HOST_2 }} 'setfacl -m u:1000:rw coasterpedia-secrets/*'
          rm -rf secret_files

      - name: Deploy to server
        run: >
          ssh ${{ secrets.DOCKER_HOST_2 }} '
            export MEDIAWIKI_IMAGE="${{needs.mediawiki_build.outputs.digest}}" &&
            export MATOMO_IMAGE="${{needs.matomo_build.outputs.digest}}" &&
            export JOBRUNNER_IMAGE="${{needs.jobrunner_build.outputs.digest}}" &&
            export DR_IMAGE="${{needs.dr_build.outputs.digest}}" &&
            export OPENSEARCH_IMAGE="v1.3.20-12" &&
            export MYSQL_PASSWORD="${{secrets.MYSQL_PASSWORD}}" &&
            export CARGO_MYSQL_PASSWORD="${{secrets.CARGO_MYSQL_PASSWORD}}" &&
            export SMTP_HOST="${{secrets.SMTP_HOST}}" &&
            export SMTP_USER="${{secrets.SMTP_USER}}" &&
            export SMTP_PASSWORD="${{secrets.SMTP_PASSWORD}}" &&
            export R2_ACCESS_KEY="${{secrets.R2_ACCESS_KEY}}" &&
            export R2_ACCESS_SECRET="${{secrets.R2_ACCESS_SECRET}}" &&
            export R2_BUCKET_NAME="${{secrets.R2_BUCKET_NAME}}" &&
            export R2_ENDPOINT="${{secrets.R2_ENDPOINT}}" &&
            export OAUTH_PRIVATE="${{secrets.OAUTH_PRIVATE}}" &&
            export OAUTH_PUBLIC="${{secrets.OAUTH_PUBLIC}}" &&
            export MATOMO_DATABASE_PASSWORD="${{secrets.MATOMO_DATABASE_PASSWORD}}" &&
            export MATOMO_API_KEY="${{secrets.MATOMO_API_KEY}}" &&
            export SECRET_KEY="${{secrets.SECRET_KEY}}" &&
            export ES_IP="${{secrets.ES_IP}}" &&
            export CLOUDFLARE_ZONEID="${{secrets.CLOUDFLARE_ZONEID}}" &&
            export CLOUDFLARE_APITOKEN="${{secrets.CLOUDFLARE_APITOKEN}}" &&
            export TURNSTILE_SECRET="${{secrets.TURNSTILE_SECRET}}" &&
            export AGE_RECIPIENT="${{secrets.AGE_RECIPIENT}}" &&
            export R2_REMOTE="${{secrets.BACKUP_R2_REMOTE}}" &&
            export HC_BASE_BACKUP_URL="${{secrets.HC_BASE_BACKUP_URL}}" &&
            export MARIADB_ROOT_PASSWORD="${{secrets.MARIADB_ROOT_PASSWORD}}" &&
            export COASTERPEDIA_TOOLS_MYSQL_PASSWORD="${{secrets.COASTERPEDIA_TOOLS_MYSQL_PASSWORD}}" &&
            export BACKUP_MYSQL_PASSWORD="${{secrets.BACKUP_MYSQL_PASSWORD}}" &&
            if [ -d coasterpedia/.git ]; then cd coasterpedia && git pull; else git clone --depth 1 -b develop https://github.com/${{ github.repository }} coasterpedia && cd coasterpedia; fi &&
            docker compose pull &&
            docker compose up -d -V &&
            docker system prune -f &&
            docker volume prune -f
          '